<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Thiệp Công Huy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #a855f7, transparent 55%),
        radial-gradient(circle at 100% 100%, #facc15, #fef3c7 60%, #020617 100%);
      color: #e5e7eb;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 0px)
               env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px)
               env(safe-area-inset-left, 0px);
    }

    .card {
      width: 100%;
      max-width: 430px;
      border-radius: 28px;
      padding: 1.6rem 1.4rem 1.9rem;
      background: radial-gradient(circle at top, #020617, #020617 60%, #111827 100%);
      border: 1px solid rgba(250, 204, 21, 0.5);
      box-shadow: 0 26px 70px rgba(15, 23, 42, 0.9);
      position: relative;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #facc15;
    }

    .title {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 0.2rem;
      color: #fbbf24;
    }

    .play {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      border: 1px solid rgba(250, 204, 21, 0.7);
      background: #0f172a;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: #facc15;
    }

    .play-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .photo-main,
    .photo-baby {
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }

    .photo-main {
      border: 2px solid rgba(250, 204, 21, 0.9);
      box-shadow: 0 22px 50px rgba(250, 204, 21, 0.5);
    }

    .photo-baby {
      border-radius: 18px;
      border: 1px solid rgba(96, 165, 250, 0.9);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.9);
    }

    .photo-main img,
    .photo-baby img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .letter {
      position: relative;
      background: #020617;
      color: #e5e7eb;
      border-radius: 18px;
      padding: 1.2rem 1.3rem 1.3rem;
      border: 1px solid rgba(139, 92, 246, 0.7);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 1);
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      border: 1px dashed rgba(129, 140, 248, 0.8);
      pointer-events: none;
    }

    .letter-title {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: 0.98rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      color: #facc15;
    }

    .letter-body {
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .footer {
      margin-top: 1rem;
      font-size: 0.8rem;
      opacity: 0.8;
      text-align: center;
      color: #e5e7eb;
    }

    .spotlight {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(250, 204, 21, 0.4), transparent 60%),
        radial-gradient(circle at 0% 100%, rgba(147, 51, 234, 0.35), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.3), transparent 60%);
      opacity: 0.45;
      pointer-events: none;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spotlight"></div>
    <div class="header">
      <div>
        <div class="tag">27.02 · Công Huy</div>
        <div class="title">Hype MC Birthday</div>
      </div>
      <button class="play" id="btnPlay">
        <span class="play-dot"></span>
        <span>Bật nhạc</span>
      </button>
    </div>

    <div class="content">
      <div class="photo-main">
        <img src="huy.jpg" alt="Công Huy" />
      </div>

      <div class="photo-baby">
        <img src="huybe.jpg" alt="Công Huy bé" />
      </div>

      <div class="letter">
        <div class="letter-title">Gửi Công Huy,</div>
        <div class="letter-body">
          <p>Chúc bạn tuổi 23 cầm mic ngày càng chắc, job tới tấp và luôn giữ được cái nhiệt huyết này..</p>
        </div>
      </div>
    </div>

    <p class="footer">Nhấn nút bên trên nếu muốn nghe "Cross Over".</p>
  </div>

  <audio id="bg" src="Cross Over.mp3" preload="auto" loop></audio>
  <script>
    const btnPlay = document.getElementById("btnPlay");
    const bg = document.getElementById("bg");
    let musicOn = false;

    btnPlay?.addEventListener("click", async () => {
      if (!bg) return;
      try {
        if (!musicOn) {
          await bg.play();
          musicOn = true;
          btnPlay.querySelector("span:nth-child(2)").textContent = "Tắt nhạc";
        } else {
          bg.pause();
          musicOn = false;
          btnPlay.querySelector("span:nth-child(2)").textContent = "Bật nhạc";
        }
      } catch (e) {
        // nếu bị chặn autoplay thì bỏ qua
      }
    });
  </script>
</body>
</html>
